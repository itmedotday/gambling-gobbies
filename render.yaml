services:
  - type: web
    name: gambling-gobbies-server
    runtime: docker
    dockerfilePath: ./Dockerfile.server
    plan: free
    healthCheckPath: /api/health
    disk:
      name: gobbies-data
      mountPath: /app/apps/server/.data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: TOKEN_SIGNING_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://gambling-gobbies.vercel.app
