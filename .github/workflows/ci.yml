name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck --workspaces --if-present
      - run: npm run test
      - run: npm run build
      - name: Server health smoke
        run: |
          npm run start -w apps/server &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:2567/api/health >/dev/null; then
              curl -sf http://localhost:2567/api/health
              kill $SERVER_PID
              exit 0
            fi
            sleep 1
          done
          kill $SERVER_PID || true
          exit 1
      - run: npx playwright install chromium --with-deps
        working-directory: apps/web
      - run: npm run e2e
        working-directory: apps/web
